name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      # libghostty-vt-sys vendors Ghostty's C core; Zig is required to
      # build it on every platform.
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install macOS dependencies
        run: |
          brew update
          brew install pkg-config cmake

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: macos-aarch64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-aarch64-cargo-

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Generate icon if missing
        run: |
          if [[ ! -f "assets/AppIcon.icns" ]]; then
            chmod +x scripts/generate-placeholder-icon.sh
            ./scripts/generate-placeholder-icon.sh
          fi

      - name: Create app bundle
        run: |
          VERSION=${GITHUB_REF#refs/tags/}

          # Create bundle structure
          mkdir -p Dockside.app/Contents/MacOS
          mkdir -p Dockside.app/Contents/Resources

          # Copy binary
          cp target/aarch64-apple-darwin/release/dockside Dockside.app/Contents/MacOS/

          # Copy Info.plist and update version
          cp assets/Info.plist Dockside.app/Contents/
          VERSION_NUM=${VERSION#v}
          sed -i '' "s/0.1.0/$VERSION_NUM/g" Dockside.app/Contents/Info.plist

          # Copy icon if exists
          if [[ -f "assets/AppIcon.icns" ]]; then
            cp assets/AppIcon.icns Dockside.app/Contents/Resources/
          fi

          # Copy themes
          cp -R themes Dockside.app/Contents/Resources/

          # Package
          zip -r Dockside-$VERSION-macos-arm64.zip Dockside.app

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: Dockside-macos-arm64
          path: Dockside-*.zip

  build-linux:
    name: Build Linux App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            cmake \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libvulkan-dev \
            libasound2-dev

      # libghostty-vt-sys vendors Ghostty's C core; Zig is required to
      # build it on every platform.
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: linux-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            linux-x86_64-cargo-

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Create Linux package
        run: |
          VERSION=${GITHUB_REF#refs/tags/}

          # Create package directory
          mkdir -p dockside-$VERSION-linux-x86_64

          # Copy binary
          cp target/x86_64-unknown-linux-gnu/release/dockside dockside-$VERSION-linux-x86_64/

          # Copy themes
          cp -R themes dockside-$VERSION-linux-x86_64/

          # Copy assets
          mkdir -p dockside-$VERSION-linux-x86_64/assets
          cp assets/icon.png dockside-$VERSION-linux-x86_64/assets/

          # Create desktop entry
          cat > dockside-$VERSION-linux-x86_64/dockside.desktop << EOF
          [Desktop Entry]
          Name=Dockside
          Comment=Docker Management Desktop App
          Exec=dockside
          Icon=dockside
          Type=Application
          Categories=Development;Utility;
          EOF

          # Create README
          cat > dockside-$VERSION-linux-x86_64/README.md << EOF
          # Dockside for Linux

          ## Installation

          1. Extract this archive
          2. Copy the \`dockside\` binary to /usr/local/bin or ~/.local/bin
          3. Copy the \`themes\` directory to ~/.config/dockside/themes
          4. (Optional) Copy dockside.desktop to ~/.local/share/applications/

          ## Requirements

          - Docker installed and running
          - Or Colima for VM-based Docker
          EOF

          # Package
          tar -czvf Dockside-$VERSION-linux-x86_64.tar.gz dockside-$VERSION-linux-x86_64

      - name: Upload Linux package
        uses: actions/upload-artifact@v4
        with:
          name: Dockside-linux-x86_64
          path: Dockside-*.tar.gz

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Extract changelog for version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}

          # Extract the section for this version from CHANGELOG.md
          if [[ -f "CHANGELOG.md" ]]; then
            awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{found=0} found" CHANGELOG.md > changelog.md

            if [[ -s changelog.md ]]; then
              {
                echo ""
                echo "## Installation"
                echo ""
                echo "### macOS (Apple Silicon)"
                echo ""
                echo "Download \`Dockside-vX.X.X-macos-arm64.zip\`, extract, and move \`Dockside.app\` to \`/Applications\`."
                echo ""
                echo "### Linux (x86_64)"
                echo ""
                echo "Download \`Dockside-vX.X.X-linux-x86_64.tar.gz\`, extract, and run \`./dockside\`."
                echo ""
                echo "### Build from Source"
                echo ""
                echo '```bash'
                echo "git clone https://github.com/salamaashoush/dockside"
                echo "cd dockside"
                echo "cargo build --release"
                echo '```'
              } >> changelog.md
            else
              echo "## What's Changed" > changelog.md
              echo "" >> changelog.md
              git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")..HEAD 2>/dev/null | head -20 >> changelog.md || echo "- Initial release" >> changelog.md
            fi
          else
            echo "## What's Changed" > changelog.md
            echo "" >> changelog.md
            git log --pretty=format:"- %s" -20 >> changelog.md
          fi

          echo "Generated release notes:"
          cat changelog.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
