name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  # Pin cargo-packager so a new minor release doesn't silently change
  # the artifact layout for users.
  CARGO_PACKAGER_VERSION: '0.11.5'

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    env:
      TARGET: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      # libghostty-vt-sys vendors Ghostty's C core; Zig is required to
      # build it on every platform.
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install macOS dependencies
        run: |
          brew update
          brew install pkg-config cmake create-dmg

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: macos-aarch64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-aarch64-cargo-

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked --version ${{ env.CARGO_PACKAGER_VERSION }}

      - name: Generate icon if missing
        run: |
          if [[ ! -f "assets/AppIcon.icns" ]]; then
            chmod +x scripts/generate-placeholder-icon.sh
            ./scripts/generate-placeholder-icon.sh
          fi

      - name: Build
        run: cargo build --release --target $TARGET

      - name: Stage helper for cargo-packager
        # external_binaries expects `<name>-<target-triple>` next to the
        # main binary. Symlink rather than copy to keep build artifacts
        # in a single canonical location.
        run: |
          ln -sf "$PWD/target/$TARGET/release/dockside-helper" \
                 "$PWD/target/dockside-helper-$TARGET"

      - name: Package
        run: cargo packager --release --target $TARGET --formats=app,dmg --verbose

      - name: Stamp version into Info.plist
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          PLIST="target/$TARGET/release/Dockside.app/Contents/Info.plist"
          if [[ -f "$PLIST" ]]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$PLIST" || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" "$PLIST" || true
          fi

      - name: Collect artifacts
        run: |
          mkdir -p out
          # cargo-packager drops outputs in target/<triple>/release/
          find target/$TARGET/release -maxdepth 1 \
            \( -name '*.dmg' -o -name 'Dockside.app' \) \
            -exec cp -R {} out/ \;
          # Zip the .app for Releases (DMG already a single file).
          if [[ -d "out/Dockside.app" ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            (cd out && zip -ry "Dockside-$VERSION-macos-arm64.zip" Dockside.app && rm -rf Dockside.app)
          fi
          ls -la out

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Dockside-macos-arm64
          path: out/*

  build-linux:
    name: Build Linux App
    runs-on: ubuntu-latest
    env:
      TARGET: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            cmake \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libssl-dev \
            libvulkan-dev \
            libasound2-dev \
            file \
            libfuse2 \
            librsvg2-dev

      # libghostty-vt-sys vendors Ghostty's C core; Zig is required to
      # build it on every platform.
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: linux-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            linux-x86_64-cargo-

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked --version ${{ env.CARGO_PACKAGER_VERSION }}

      - name: Build
        run: cargo build --release --target $TARGET

      - name: Stage helper for cargo-packager
        run: |
          ln -sf "$PWD/target/$TARGET/release/dockside-helper" \
                 "$PWD/target/dockside-helper-$TARGET"

      - name: Package
        # `pacman` emits a source tarball + PKGBUILD that downstream
        # consumers (Arch / CachyOS / Manjaro / AUR maintainers) feed
        # into `makepkg -si`. We don't run makepkg in CI — that would
        # need an Arch container — but we still publish the tarball so
        # users have a one-step source for an AUR-style PKGBUILD.
        run: cargo packager --release --target $TARGET --formats=deb,appimage,pacman --verbose

      - name: Collect artifacts
        run: |
          mkdir -p out
          find target/$TARGET/release -maxdepth 1 \
            \( -name '*.deb' -o -name '*.AppImage' -o -name '*.tar.gz' -o -name 'PKGBUILD' \) \
            -exec cp {} out/ \;
          ls -la out

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Dockside-linux-x86_64
          path: out/*

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Extract changelog for version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}

          # Extract the section for this version from CHANGELOG.md
          if [[ -f "CHANGELOG.md" ]]; then
            awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{found=0} found" CHANGELOG.md > changelog.md

            if [[ -s changelog.md ]]; then
              {
                echo ""
                echo "## Installation"
                echo ""
                echo "### One-liner (recommended)"
                echo ""
                echo '```bash'
                echo "curl -fsSL https://raw.githubusercontent.com/salamaashoush/dockside/main/scripts/install.sh | bash"
                echo '```'
                echo ""
                echo "### macOS (Apple Silicon)"
                echo ""
                echo "Download the \`.dmg\`, open it, drag \`Dockside.app\` to \`Applications\`. The privileged \`dockside-helper\` lives inside \`Contents/MacOS/\` next to the main app — do not separate them."
                echo ""
                echo "### Linux (x86_64)"
                echo ""
                echo "* **AppImage** (universal): download, \`chmod +x\`, run."
                echo "* **Debian / Ubuntu**: \`sudo dpkg -i Dockside_*_amd64.deb\` (auto-installs polkit policy + nftables dependency)."
                echo "* **Arch / CachyOS / Manjaro**: download \`PKGBUILD\` + the matching source tarball into the same dir, then \`makepkg -si\` (auto-installs polkit policy + nftables dependency). AUR mirror coming."
                echo ""
                echo "After first launch, open **Settings → Local DNS → Set up Local DNS** to register the system resolver and trust the local CA. \`.deb\` users skip the helper-copy prompt because the package already drops the polkit policy."
                echo ""
                echo "### Build from Source"
                echo ""
                echo '```bash'
                echo "git clone https://github.com/salamaashoush/dockside"
                echo "cd dockside"
                echo "cargo build --release"
                echo "cargo install cargo-packager --locked"
                echo "cargo packager --release --formats app dmg     # macOS"
                echo "cargo packager --release --formats deb appimage pacman  # Linux"
                echo '```'
              } >> changelog.md
            else
              echo "## What's Changed" > changelog.md
              echo "" >> changelog.md
              git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")..HEAD 2>/dev/null | head -20 >> changelog.md || echo "- Initial release" >> changelog.md
            fi
          else
            echo "## What's Changed" > changelog.md
            echo "" >> changelog.md
            git log --pretty=format:"- %s" -20 >> changelog.md
          fi

          echo "Generated release notes:"
          cat changelog.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          files: |
            artifacts/**/*.zip
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.tar.gz
            artifacts/**/PKGBUILD
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
