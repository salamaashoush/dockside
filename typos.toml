# typos configuration for Dockside
# https://github.com/crate-ci/typos

[files]
extend-exclude = [
    "Cargo.lock",
    "target/",
    "*.icns",
    "*.png",
    "*.jpg",
    "*.jpeg",
    "*.gif",
    "*.ico",
]

[default]
extend-ignore-identifiers-re = [
    # Common Rust/Docker identifiers that look like typos
    "pty",
    "tty",
    "pty_terminal",
]

[default.extend-words]
# Technical terms that are correct
pty = "pty"
tty = "tty"
dockside = "dockside"
colima = "colima"
kubectl = "kubectl"
# Acronyms typos misreads as misspellings.
AKS = "AKS"
EKS = "EKS"
GKE = "GKE"
# Historical CHANGELOG line refers to a past commit's exact wording.
unparseable = "unparseable"

[type.rust]
extend-ignore-identifiers-re = [
    # Rust-specific patterns
    "cx",
]
